<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Solid Ball Centrifuge</title>
    <style>
        body {
            margin: 0;
            background: #0a0a0a;
            color: #00f2ff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            border: 4px solid #222;
            border-radius: 50%; /* Makes the canvas border match the game */
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.1);
        }
        #ui {
            position: absolute;
            top: 20px;
            text-align: center;
            pointer-events: none;
        }
        .count-box {
            font-size: 3rem;
            font-weight: bold;
            text-shadow: 0 0 10px #00f2ff;
        }
        #gameOver {
            position: absolute;
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border: 2px solid #00f2ff;
            text-align: center;
            display: none;
            z-index: 10;
        }
        button {
            padding: 10px 25px;
            background: #00f2ff;
            border: none;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div class="count-box"><span id="count">1</span></div>
        <div>BALLS ACTIVE</div>
    </div>
    
    <div id="gameOver">
        <h1>CONTAINMENT BREACH</h1>
        <p>A ball has escaped the centrifuge.</p>
        <button onclick="resetGame()">RESTART SYSTEM</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const countDisplay = document.getElementById('count');
        const gameOverScreen = document.getElementById('gameOver');

        canvas.width = 600;
        canvas.height = 600;

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const ringRadius = 260;
        const ballRadius = 10;
        const gapSize = 0.35; // Decreased gap size (tighter)
        const baseSpeed = 6;  // Increased speed
        
        let balls = [];
        let ringRotation = 0;
        let isGameOver = false;

        class Ball {
            constructor(x, y, vx, vy, color) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.color = color;
            }

            draw() {
                // Draw as a solid 3D sphere using radial gradient
                const gradient = ctx.createRadialGradient(
                    this.x - ballRadius/3, this.y - ballRadius/3, ballRadius/4,
                    this.x, this.y, ballRadius
                );
                gradient.addColorStop(0, '#fff');
                gradient.addColorStop(0.4, this.color);
                gradient.addColorStop(1, '#000');

                ctx.beginPath();
                ctx.arc(this.x, this.y, ballRadius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                ctx.closePath();
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                const dx = this.x - centerX;
                const dy = this.y - centerY;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance + ballRadius >= ringRadius) {
                    let angle = Math.atan2(dy, dx);
                    if (angle < 0) angle += Math.PI * 2;

                    let currentGapStart = ringRotation % (Math.PI * 2);
                    let currentGapEnd = (ringRotation + gapSize) % (Math.PI * 2);

                    let inGap = false;
                    if (currentGapStart < currentGapEnd) {
                        if (angle > currentGapStart && angle < currentGapEnd) inGap = true;
                    } else {
                        if (angle > currentGapStart || angle < currentGapEnd) inGap = true;
                    }

                    if (inGap) {
                        // Let it keep moving out
                        if (distance > ringRadius + 50) isGameOver = true;
                    } else {
                        // Solid bounce logic
                        const normalX = dx / distance;
                        const normalY = dy / distance;
                        const dot = this.vx * normalX + this.vy * normalY;
                        
                        this.vx -= 2 * dot * normalX;
                        this.vy -= 2 * dot * normalY;

                        // Reposition inside
                        this.x = centerX + (ringRadius - ballRadius - 2) * Math.cos(angle);
                        this.y = centerY + (ringRadius - ballRadius - 2) * Math.sin(angle);

                        if (balls.length < 60) spawnExtraBall(this.x, this.y);
                    }
                }
            }
        }

        function spawnExtraBall(x, y) {
            const angle = Math.random() * Math.PI * 2;
            balls.push(new Ball(
                x, y, 
                Math.cos(angle) * baseSpeed, 
                Math.sin(angle) * baseSpeed, 
                `hsl(${Math.random() * 360}, 80%, 50%)`
            ));
        }

        function resetGame() {
            balls = [new Ball(centerX, centerY, baseSpeed, baseSpeed * 0.7, '#00f2ff')];
            isGameOver = false;
            gameOverScreen.style.display = 'none';
            ringRotation = 0;
            animate();
        }

        function drawRing() {
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00f2ff';
            ctx.strokeStyle = '#00f2ff';
            ctx.lineWidth = 8;
            ctx.lineCap = 'round';
            
            ctx.beginPath();
            // The "Open Space" is created by only drawing the arc where the gap IS NOT.
            ctx.arc(centerX, centerY, ringRadius, ringRotation + gapSize, ringRotation + (Math.PI * 2));
            ctx.stroke();
            ctx.shadowBlur = 0; // Reset blur for balls
        }

        function animate() {
            if (isGameOver) {
                gameOverScreen.style.display = 'block';
                return;
            }

            // Clear canvas fully to make balls look "Solid" (no trails)
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ringRotation += 0.015; // Faster ring rotation
            drawRing();

            balls.forEach(ball => {
                ball.update();
                ball.draw();
            });

            countDisplay.innerText = balls.length;
            requestAnimationFrame(animate);
        }

        resetGame();
    </script>
</body>
</html>
