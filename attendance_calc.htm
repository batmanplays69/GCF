<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Attendance Calculator</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 { text-align: center; color: var(--primary); margin-bottom: 1.5rem; }

        .input-group { margin-bottom: 1.2rem; }

        label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem; }

        input {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid #e2e8f0;
            border-radius: 0.5rem;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        button:hover { opacity: 0.9; }

        #result {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 0.5rem;
            text-align: center;
            font-weight: 500;
            display: none;
        }

        .success { background: #dcfce7; color: #166534; }
        .warning { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

<div class="container">
    <h2>Attendance Pro</h2>
    
    <div class="input-group">
        <label>Classes Attended</label>
        <input type="number" id="attended" placeholder="e.g. 15">
    </div>

    <div class="input-group">
        <label>Total Classes Conducted</label>
        <input type="number" id="total" placeholder="e.g. 20">
    </div>

    <div class="input-group">
        <label>Target Percentage (%)</label>
        <input type="number" id="goal" value="75">
    </div>

    <button onclick="calculate()">Calculate Status</button>

    <div id="result"></div>
</div>

<script>
    function calculate() {
        const attended = parseInt(document.getElementById('attended').value);
        const total = parseInt(document.getElementById('total').value);
        const goal = parseInt(document.getElementById('goal').value);
        const resultDiv = document.getElementById('result');

        if (isNaN(attended) || isNaN(total) || isNaN(goal)) {
            alert("Please enter valid numbers");
            return;
        }

        const currentPerc = (attended / total) * 100;
        resultDiv.style.display = "block";
        
        let message = `Current Attendance: <strong>${currentPerc.toFixed(1)}%</strong><br>`;

        if (currentPerc >= goal) {
            // How many can they miss?
            let canMiss = 0;
            let tempTotal = total;
            while (((attended) / (tempTotal + 1)) * 100 >= goal) {
                canMiss++;
                tempTotal++;
            }
            resultDiv.className = "success";
            message += canMiss > 0 
                ? `You can miss the next <strong>${canMiss}</strong> classes.` 
                : `You are exactly on track! Don't miss any more.`;
        } else {
            // How many to attend?
            let needToAttend = Math.ceil((goal * total - 100 * attended) / (100 - goal));
            resultDiv.className = "warning";
            message += `You need to attend <strong>${needToAttend}</strong> more classes to reach ${goal}%.`;
        }

        resultDiv.innerHTML = message;
    }
</script>

</body>
</html>
