<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mind-Blowing Particle Vortex</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000; /* Dark space background */
            cursor: crosshair;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-family: 'Arial', sans-serif;
            pointer-events: none;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div id="ui">Move your mouse to control the flow</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const mouse = { x: null, y: null, radius: 150 };

        // Resize canvas
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        });

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });

        class Particle {
            constructor(x, y, moveX, moveY, size, color) {
                this.x = x;
                this.y = y;
                this.moveX = moveX;
                this.moveY = moveY;
                this.size = size;
                this.color = color;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }

            update() {
                // Check if mouse is near
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx*dx + dy*dy);

                if (distance < mouse.radius) {
                    // Push particles away or pull them in
                    this.x -= dx / 10;
                    this.y -= dy / 10;
                }

                // Bounce off edges
                if (this.x > canvas.width || this.x < 0) this.moveX = -this.moveX;
                if (this.y > canvas.height || this.y < 0) this.moveY = -this.moveY;

                this.x += this.moveX;
                this.y += this.moveY;
                this.draw();
            }
        }

        function init() {
            particles = [];
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            let numberOfParticles = (canvas.width * canvas.height) / 9000;
            
            for (let i = 0; i < numberOfParticles * 10; i++) {
                let size = (Math.random() * 2) + 1;
                let x = (Math.random() * (innerWidth - size * 2) + size * 2);
                let y = (Math.random() * (innerHeight - size * 2) + size * 2);
                let moveX = (Math.random() * 2) - 1;
                let moveY = (Math.random() * 2) - 1;
                let color = `hsl(${Math.random() * 360}, 70%, 70%)`; // Beautiful neon colors

                particles.push(new Particle(x, y, moveX, moveY, size, color));
            }
        }

        function animate() {
            // Create a "trail" effect by not clearing the canvas fully
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
            }
            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>
</html>
