<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Treasure Hunt Game</title>
  <!-- <script src="script.js"></script> -->
  <style>
    body {
      font-family: Arial;
      background: #1e1e2f;
      color: white;
      text-align: center;
      padding-top: 50px;
    }

    .box {
      background: #2c2c3c;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      margin: auto;
    }

    input {
      padding: 10px;
      width: 80%;
      margin: 10px 0;
    }

    button {
      padding: 10px 20px;
      background: gold;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .result {
      margin-top: 15px;
      padding: 10px;
      background: #444;
    }
  </style>
</head>
<body>
  <script>

    let secretNumber = Math.floor(Math.random()*10)+1;
    let attempts = 0;
    function playGame(){
      let userGuess = Number(document.getElementById("guess").value);
      attempts++;
    let message =" ";
    if(userGuess === secretNumber){
      message = "You found the treasure in " + attempts + " attempts!";
    }
    else if(userGuess>secretNumber){
      message = "Too high! Try again.";
      
      
    }else{
      message = "Too low! Try Again";
    }
    document.getElementById("output").innerHTML = message;
  }
  </script>
  
  <div class="box">
    <h2>🏴‍☠️ Treasure Hunt</h2>
    <p>Guess a number between 1 and 10</p>
    
    <input type="number" id="guess" placeholder="Enter your guess">
    <br>
    <button onclick="playGame()">Try Your Luck</button>
    
    <div class="result" id="output"></div>
  </div>
  
</body>
